<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — SmartDormX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="theme.css"/>
  <link rel="stylesheet" href="sign-in.css"/>
</head>
<body>

<!-- Animated Background -->
<div class="signin-bg">
  <div class="signin-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="signin-wrap">
  <div class="signin-card">

    <!-- Logo -->
    <div class="signin-logo">
      <div class="signin-logo-icon">
        <i class="fas fa-building"></i>
      </div>
      <h1>SmartDormX</h1>
      <p>PAF-IAST Smart Hostel Management System</p>
    </div>

    <!-- Portal Toggle -->
    <div class="portal-toggle" role="tablist">
      <button class="portal-tab active" id="adminTab" onclick="switchPortal('admin')" role="tab">
        <i class="fas fa-shield-halved"></i> Admin
      </button>
      <button class="portal-tab" id="studentTab" onclick="switchPortal('student')" role="tab">
        <i class="fas fa-graduation-cap"></i> Student
      </button>
    </div>

    <!-- Form -->
    <div id="loginError" style="display:none;background:rgba(255,65,108,.15);border:1px solid rgba(255,65,108,.3);color:#FF416C;font-size:.8rem;padding:9px 14px;border-radius:10px;margin-bottom:16px;"></div>

    <div class="field-group">
      <label>Email / Username</label>
      <div class="field-wrap">
        <i class="fas fa-envelope"></i>
        <input type="text" id="usernameInput" placeholder="admin@paf-iast.edu.pk" autocomplete="username"/>
      </div>
    </div>

    <div class="field-group">
      <label>Password</label>
      <div class="field-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password"/>
        <i class="fas fa-eye" id="togglePass" onclick="togglePassword()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:rgba(255,255,255,.3);pointer-events:all;font-size:.88rem;"></i>
      </div>
    </div>

    <div class="demo-hint">
      <i class="fas fa-circle-info"></i>
      Demo mode — any credentials work
    </div>

    <button class="signin-btn" id="loginBtn" onclick="handleLogin()">
      <i class="fas fa-right-to-bracket"></i>
      <span id="loginBtnText">Sign In as Admin</span>
    </button>

    <div class="signin-footer">
      Powered by <strong style="color:rgba(123,198,251,.7)">OpenCV DNN + FisherFace</strong> · Flask 3.0 · SQLite
    </div>

  </div>
</div>

<script>
  var currentPortal = 'admin';

  function switchPortal(type) {
    currentPortal = type;
    document.getElementById('adminTab').classList.toggle('active', type==='admin');
    document.getElementById('studentTab').classList.toggle('active', type==='student');
    document.getElementById('loginBtnText').textContent = type==='admin' ? 'Sign In as Admin' : 'Sign In as Student';
    document.getElementById('usernameInput').placeholder = type==='admin' ? 'admin@paf-iast.edu.pk' : 'b22f1154cs030@paf-iast.edu.pk';
  }

  function togglePassword() {
    var inp = document.getElementById('passwordInput');
    var icon = document.getElementById('togglePass');
    if (inp.type==='password') { inp.type='text'; icon.className='fas fa-eye-slash'; icon.style.cssText=icon.style.cssText; }
    else { inp.type='password'; icon.className='fas fa-eye'; }
    icon.style.position='absolute'; icon.style.right='14px'; icon.style.top='50%'; icon.style.transform='translateY(-50%)'; icon.style.cursor='pointer'; icon.style.color='rgba(255,255,255,.3)'; icon.style.pointerEvents='all'; icon.style.fontSize='.88rem';
  }

  function handleLogin() {
    var u = document.getElementById('usernameInput').value.trim();
    var p = document.getElementById('passwordInput').value.trim();
    var err = document.getElementById('loginError');
    if (!u || !p) { err.style.display='block'; err.textContent='Please enter both username and password.'; return; }
    err.style.display='none';
    var btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff;"></span> Signing in...';
    btn.style.opacity='.8';
    setTimeout(function() {
      if (currentPortal==='admin') { window.location.href='dashboard.html'; }
      else { window.location.href='../student-portal/sign-in.html'; }
    }, 700);
  }

  document.addEventListener('keydown', function(e){ if(e.key==='Enter') handleLogin(); });
</script>
</body>
</html>
